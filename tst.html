<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekadashi Calendar 🕉️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sacred-gold: #D4AF37;
            --deep-saffron: #FF9933;
            --temple-white: #FFF8F0;
            --lotus-pink: #FFC0E5;
            --sandalwood: #D2691E;
            --incense-purple: #6B4C9A;
            --meditation-blue: #1A1F3A;
            --moonlight: #E8E4D9;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #1A1F3A 0%, #2D1B4E 50%, #1A1F3A 100%);
            color: var(--temple-white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            transform: translate(-50%, -50%) rotate(0deg);
            animation: mandalaRotate 120s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes mandalaRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--sacred-gold);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) translateX(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px);
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        .om-symbol {
            font-size: 80px;
            background: linear-gradient(135deg, var(--sacred-gold), var(--deep-saffron));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sacred-gold) 0%, var(--deep-saffron) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 20px;
            color: var(--moonlight);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-selector {
            margin-bottom: 40px;
        }

        .feature-selector label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--sacred-gold);
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 18px 24px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            color: var(--temple-white);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        select:hover {
            border-color: var(--sacred-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        select:focus {
            outline: none;
            border-color: var(--deep-saffron);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        option {
            background: var(--meditation-blue);
            color: var(--temple-white);
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--sacred-gold);
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 16px 20px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            color: var(--temple-white);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--deep-saffron);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .btn {
            width: 100%;
            padding: 20px;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--sacred-gold), var(--deep-saffron));
            color: var(--meditation-blue);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .result {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .result h3 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--sacred-gold);
            margin-bottom: 20px;
            text-align: center;
        }

        .result-content {
            font-size: 20px;
            line-height: 1.8;
            color: var(--moonlight);
        }

        .ekadashi-date {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(255, 153, 51, 0.2));
            border-radius: 10px;
            margin: 5px;
            border: 1px solid var(--sacred-gold);
        }

        .year-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .year-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .year-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--sacred-gold);
            transform: translateY(-2px);
        }

        .year-item strong {
            color: var(--sacred-gold);
        }

        .status-positive {
            color: #4ADE80;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .status-negative {
            color: var(--moonlight);
            font-size: 20px;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--sacred-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--moonlight);
            font-size: 16px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 40px;
            }

            .om-symbol {
                font-size: 60px;
            }

            .main-card {
                padding: 30px 20px;
            }

            .year-list {
                grid-template-columns: 1fr;
            }
        }

        .api-config {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .api-config input {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <script>
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="container">
        <header>
            <div class="om-symbol">🕉️</div>
            <h1>EKADASHI</h1>
            <p class="subtitle">Sacred Lunar Calendar</p>
        </header>

        <div class="main-card">
            <!-- API Configuration (for later when you deploy) -->
            <div class="api-config" id="apiConfig">
                <label style="font-family: 'Cinzel', serif; color: var(--sacred-gold); margin-bottom: 10px; display: block;">
                    API URL (optional - leave empty for local)
                </label>
                <input type="text" id="apiUrl" placeholder="http://localhost:8000" 
                       style="margin-bottom: 10px;">
                <small style="color: var(--moonlight); opacity: 0.7;">
                    When using local Python functions, leave this empty. When deployed, enter your Vercel URL.
                </small>
            </div>

            <div class="feature-selector">
                <label for="featureSelect">Choose Feature</label>
                <select id="featureSelect" onchange="handleFeatureChange()">
                    <option value="">Select an option...</option>
                    <option value="today">Is Today Ekadashi?</option>
                    <option value="tomorrow">Is Tomorrow Ekadashi?</option>
                    <option value="next">Next Ekadashi Date</option>
                    <option value="year">Ekadashis in a Year</option>
                    <option value="check">Check Specific Date</option>
                </select>
            </div>

            <div id="inputSection" style="display: none;"></div>

            <button id="checkButton" class="btn" onclick="performCheck()" style="display: none;">
                <span>CHECK</span>
            </button>

            <div id="result"></div>
        </div>

        <footer>
            <p>🪷 May this sacred day bring peace and spiritual growth 🪷</p>
        </footer>
    </div>

    <script>
        // API helper function
        async function callAPI(endpoint) {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            
            if (!apiUrl) {
                // Local mode - show instruction
                return {
                    error: 'LOCAL_MODE',
                    message: 'Connect to your FastAPI backend to use real calculations'
                };
            }
            
            try {
                const response = await fetch(`${apiUrl}${endpoint}`);
                if (!response.ok) throw new Error('API request failed');
                return await response.json();
            } catch (error) {
                return {
                    error: 'API_ERROR',
                    message: 'Could not connect to API. Make sure your FastAPI server is running.'
                };
            }
        }

        function handleFeatureChange() {
            const feature = document.getElementById('featureSelect').value;
            const inputSection = document.getElementById('inputSection');
            const checkButton = document.getElementById('checkButton');
            const result = document.getElementById('result');
            
            result.innerHTML = '';
            
            if (feature === '') {
                inputSection.style.display = 'none';
                checkButton.style.display = 'none';
                return;
            }
            
            if (feature === 'year') {
                inputSection.style.display = 'block';
                inputSection.innerHTML = `
                    <div class="input-group">
                        <label for="yearInput">Enter Year</label>
                        <input type="number" id="yearInput" placeholder="e.g., 2025" min="2000" max="2100" value="2025">
                    </div>
                `;
                checkButton.style.display = 'block';
            } else if (feature === 'check') {
                inputSection.style.display = 'block';
                inputSection.innerHTML = `
                    <div class="input-group">
                        <label for="dateInput">Enter Date (YYYY-MM-DD)</label>
                        <input type="text" id="dateInput" placeholder="e.g., 2025-03-15">
                    </div>
                `;
                checkButton.style.display = 'block';
            } else {
                inputSection.style.display = 'none';
                checkButton.style.display = 'block';
            }
        }

        async function performCheck() {
            const feature = document.getElementById('featureSelect').value;
            const result = document.getElementById('result');
            
            result.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Calculating...</p>
                </div>
            `;
            
            await new Promise(resolve => setTimeout(resolve, 300));
            
            switch(feature) {
                case 'today':
                    await checkToday();
                    break;
                case 'tomorrow':
                    await checkTomorrow();
                    break;
                case 'next':
                    await showNextEkadashi();
                    break;
                case 'year':
                    await showYearEkadashis();
                    break;
                case 'check':
                    await checkSpecificDate();
                    break;
            }
        }

        async function checkToday() {
            const data = await callAPI('/today');
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const result = document.getElementById('result');
            
            if (data.error) {
                result.innerHTML = `
                    <div class="result">
                        <h3>Local Mode</h3>
                        <div class="result-content" style="text-align: center;">
                            <p style="color: var(--sacred-gold); margin-bottom: 15px;">
                                ${data.message}
                            </p>
                            <p style="font-size: 16px; opacity: 0.8;">
                                To use real calculations:<br>
                                1. Run your FastAPI server: <code>uvicorn main:app --reload</code><br>
                                2. Enter API URL above (e.g., http://localhost:8000)
                            </p>
                        </div>
                    </div>
                `;
                return;
            }
            
            result.innerHTML = `
                <div class="result">
                    <h3>Today: ${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="status-positive">✨ Yes! Today is Ekadashi ✨<br>🙏 Observe fasting and prayers</div>' 
                            : '<div class="status-negative">Today is not Ekadashi</div>'}
                    </div>
                </div>
            `;
        }

        async function checkTomorrow() {
            const data = await callAPI('/tomorrow');
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dateStr = tomorrow.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const result = document.getElementById('result');
            
            if (data.error) {
                result.innerHTML = `<div class="result"><div class="result-content" style="text-align: center;"><p style="color: var(--sacred-gold);">${data.message}</p></div></div>`;
                return;
            }
            
            result.innerHTML = `
                <div class="result">
                    <h3>Tomorrow: ${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="status-positive">✨ Yes! Tomorrow is Ekadashi ✨<br>🙏 Prepare for fasting</div>' 
                            : '<div class="status-negative">Tomorrow is not Ekadashi</div>'}
                    </div>
                </div>
            `;
        }

        async function showNextEkadashi() {
            const data = await callAPI('/next');
            const result = document.getElementById('result');
            
            if (data.error) {
                result.innerHTML = `<div class="result"><div class="result-content" style="text-align: center;"><p style="color: var(--sacred-gold);">${data.message}</p></div></div>`;
                return;
            }
            
            const nextDate = new Date(data);
            const dateStr = nextDate.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const daysUntil = Math.ceil((nextDate - new Date()) / (1000 * 60 * 60 * 24));
            
            result.innerHTML = `
                <div class="result">
                    <h3>Next Ekadashi</h3>
                    <div class="result-content" style="text-align: center;">
                        <div class="ekadashi-date" style="display: block; font-size: 22px; padding: 20px; margin: 20px 0;">
                            ${dateStr}
                        </div>
                        <p style="font-size: 18px; color: var(--sacred-gold);">
                            ${daysUntil} days from now
                        </p>
                    </div>
                </div>
            `;
        }

        async function showYearEkadashis() {
            const year = document.getElementById('yearInput').value;
            
            if (!year) {
                alert('Please enter a year');
                return;
            }
            
            const data = await callAPI(`/year/${year}`);
            const result = document.getElementById('result');
            
            if (data.error) {
                result.innerHTML = `<div class="result"><div class="result-content" style="text-align: center;"><p style="color: var(--sacred-gold);">${data.message}</p></div></div>`;
                return;
            }
            
            const ekadashis = data.dates.map(date => {
                const d = new Date(date);
                return {
                    formatted: d.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        weekday: 'short'
                    }),
                    date: d
                };
            });
            
            result.innerHTML = `
                <div class="result">
                    <h3>Ekadashis in ${year}</h3>
                    <div class="result-content">
                        <p style="text-align: center; font-size: 20px; margin-bottom: 20px;">
                            Total: <strong style="color: var(--sacred-gold);">${data.total}</strong> Ekadashis
                        </p>
                        <div class="year-list">
                            ${ekadashis.map((ek, i) => `
                                <div class="year-item">
                                    <strong>#${i + 1}</strong><br>
                                    ${ek.formatted}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        async function checkSpecificDate() {
            const dateInput = document.getElementById('dateInput').value;
            
            if (!dateInput) {
                alert('Please enter a date in YYYY-MM-DD format');
                return;
            }
            
            try {
                const data = await callAPI(`/check/${dateInput}`);
                const result = document.getElementById('result');
                
                if (data.error) {
                    result.innerHTML = `<div class="result"><div class="result-content" style="text-align: center;"><p style="color: var(--sacred-gold);">${data.message}</p></div></div>`;
                    return;
                }
                
                const date = new Date(dateInput);
                const dateStr = date.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                
                result.innerHTML = `
                    <div class="result">
                        <h3>${dateStr}</h3>
                        <div class="result-content">
                            ${data.is_ekadashi 
                                ? '<div class="status-positive">✨ This date is Ekadashi ✨</div>' 
                                : '<div class="status-negative">This date is not Ekadashi</div>'}
                        </div>
                    </div>
                `;
            } catch (e) {
                alert('Invalid date format. Please use YYYY-MM-DD');
            }
        }
    </script>
</body>
</html>
