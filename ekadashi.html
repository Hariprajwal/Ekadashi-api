
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekadashi Calendar 🕉️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sacred-gold: #D4AF37;
            --deep-saffron: #FF9933;
            --temple-white: #FFF8F0;
            --meditation-blue: #1A1F3A;
            --moonlight: #E8E4D9;
            --success-green: #4ADE80;
            --error-red: #EF4444;
            --shukla-blue: #60A5FA;
            --krishna-purple: #A78BFA;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #1A1F3A 0%, #2D1B4E 50%, #1A1F3A 100%);
            color: var(--temple-white);
            min-height: 100vh;
            padding: 30px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            transform: translate(-50%, -50%) rotate(0deg);
            animation: mandalaRotate 120s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes mandalaRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .om-symbol {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sacred-gold) 0%, var(--deep-saffron) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--moonlight);
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .connection-status {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-connected {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid var(--success-green);
            color: var(--success-green);
        }

        .status-disconnected {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error-red);
            color: var(--error-red);
        }

        .status-testing {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--sacred-gold);
            color: var(--sacred-gold);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--sacred-gold);
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: var(--temple-white);
            transition: all 0.3s ease;
        }

        /* FIX: Make dropdown text visible */
        select {
            background-color: rgba(26, 31, 58, 0.95);
            cursor: pointer;
        }

        select option {
            background-color: #1A1F3A;
            color: var(--temple-white);
            padding: 10px;
        }

        input::placeholder {
            color: rgba(232, 228, 217, 0.5);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--sacred-gold);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            font-family: 'Cinzel', serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--sacred-gold), var(--deep-saffron));
            color: var(--meditation-blue);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        .test-button {
            background: rgba(255, 255, 255, 0.08);
            color: var(--sacred-gold);
            border: 2px solid var(--sacred-gold);
            padding: 10px 18px;
            margin-bottom: 20px;
            font-size: 14px;
            box-shadow: none;
        }

        .test-button:hover {
            background: rgba(212, 175, 55, 0.15);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .result h3 {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            color: var(--sacred-gold);
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: 1px;
        }

        .result-content {
            font-size: 18px;
            line-height: 1.7;
            color: var(--moonlight);
        }

        .ekadashi-yes {
            background: rgba(74, 222, 128, 0.12);
            border: 2px solid var(--success-green);
            color: var(--success-green);
            padding: 22px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        .ekadashi-no {
            text-align: center;
            padding: 18px;
            opacity: 0.85;
            font-size: 18px;
        }

        .next-ekadashi-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(255, 153, 51, 0.15));
            padding: 25px;
            border-radius: 15px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            text-align: center;
            margin: 20px 0;
        }

        .next-ekadashi-date {
            font-size: 26px;
            font-weight: 600;
            color: var(--sacred-gold);
            margin-bottom: 12px;
            font-family: 'Cinzel', serif;
        }

        .next-ekadashi-days {
            font-size: 18px;
            color: var(--moonlight);
        }

        .paksha-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 8px;
        }

        .paksha-shukla {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid var(--shukla-blue);
            color: var(--shukla-blue);
        }

        .paksha-krishna {
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid var(--krishna-purple);
            color: var(--krishna-purple);
        }

        .year-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
        }

        .year-header .total {
            font-size: 20px;
            color: var(--sacred-gold);
            font-weight: 600;
        }

        .date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 20px;
        }

        .date-card {
            background: rgba(255, 255, 255, 0.06);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            transition: all 0.3s ease;
        }

        .date-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--sacred-gold);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .date-card-number {
            color: var(--sacred-gold);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .date-card-date {
            font-size: 17px;
            color: var(--temple-white);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .date-card-day {
            font-size: 14px;
            color: var(--moonlight);
            opacity: 0.8;
        }

        .error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 35px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--sacred-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--moonlight);
            opacity: 0.7;
            font-size: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 38px;
            }
            
            .om-symbol {
                font-size: 60px;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .date-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="om-symbol">🕉️</div>
            <h1>EKADASHI</h1>
            <p class="subtitle">Sacred Lunar Calendar</p>
        </header>

        <div class="card">
            <!-- Connection Status -->
            <div id="connectionStatus" class="connection-status status-disconnected">
                🔴 Not Connected - Click Test Connection
            </div>

            <!-- API URL Input -->
            <div class="form-group">
                <label for="apiUrl">API URL</label>
                <input type="text" id="apiUrl" value="http://127.0.0.1:8000" 
                       placeholder="http://127.0.0.1:8000">
                <button class="test-button" onclick="testConnection()">
                    <span>Test Connection</span>
                </button>
            </div>

            <!-- Feature Selection -->
            <div class="form-group">
                <label for="feature">Select Feature</label>
                <select id="feature" onchange="handleFeatureChange()">
                    <option value="">-- Choose an option --</option>
                    <option value="today">Is Today Ekadashi?</option>
                    <option value="tomorrow">Is Tomorrow Ekadashi?</option>
                    <option value="next">Next Ekadashi Date</option>
                    <option value="year">All Ekadashis in a Year</option>
                    <option value="check">Check Specific Date</option>
                </select>
            </div>

            <!-- Dynamic Input Section -->
            <div id="inputSection"></div>

            <!-- Action Button -->
            <button id="actionBtn" onclick="performAction()" style="display: none;">
                <span>CHECK</span>
            </button>

            <!-- Results Section -->
            <div id="result"></div>
        </div>

        <footer>
            🪷 May this sacred day bring peace and spiritual growth 🪷
        </footer>
    </div>

    <script>
        let isConnected = false;
        let apiUrl = '';

        // Test API Connection
        async function testConnection() {
            const url = document.getElementById('apiUrl').value.trim();
            const statusDiv = document.getElementById('connectionStatus');
            
            if (!url) {
                alert('Please enter API URL');
                return;
            }

            statusDiv.innerHTML = '🟡 Testing connection...';
            statusDiv.className = 'connection-status status-testing';
            
            try {
                const response = await fetch(`${url}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                if (response.ok) {
                    const data = await response.json();
                    isConnected = true;
                    apiUrl = url;
                    statusDiv.innerHTML = '✅ Connected: ' + data.message;
                    statusDiv.className = 'connection-status status-connected';
                } else {
                    throw new Error('Connection failed');
                }
            } catch (error) {
                isConnected = false;
                statusDiv.innerHTML = `🔴 Connection Failed - Make sure server is running: <code style="color: inherit;">python main.py</code>`;
                statusDiv.className = 'connection-status status-disconnected';
                console.error('Connection error:', error);
            }
        }

        // Handle feature selection change
        function handleFeatureChange() {
            const feature = document.getElementById('feature').value;
            const inputSection = document.getElementById('inputSection');
            const actionBtn = document.getElementById('actionBtn');
            const result = document.getElementById('result');
            
            result.innerHTML = '';
            
            if (!feature) {
                inputSection.innerHTML = '';
                actionBtn.style.display = 'none';
                return;
            }

            if (feature === 'year') {
                inputSection.innerHTML = `
                    <div class="form-group">
                        <label for="yearInput">Enter Year</label>
                        <input type="number" id="yearInput" placeholder="2025" min="2000" max="2100" value="2025">
                    </div>
                `;
            } else if (feature === 'check') {
                inputSection.innerHTML = `
                    <div class="form-group">
                        <label for="dateInput">Enter Date (YYYY-MM-DD)</label>
                        <input type="text" id="dateInput" placeholder="2025-03-15">
                    </div>
                `;
            } else {
                inputSection.innerHTML = '';
            }

            actionBtn.style.display = 'block';
        }

        // Perform the selected action
        async function performAction() {
            if (!isConnected) {
                alert('Please test connection first!');
                return;
            }

            const feature = document.getElementById('feature').value;
            const result = document.getElementById('result');

            result.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Calculating...</p>
                </div>
            `;

            try {
                switch(feature) {
                    case 'today':
                        await checkToday();
                        break;
                    case 'tomorrow':
                        await checkTomorrow();
                        break;
                    case 'next':
                        await showNext();
                        break;
                    case 'year':
                        await showYear();
                        break;
                    case 'check':
                        await checkDate();
                        break;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        // Helper function to format date nicely
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function formatDateShort(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                year: 'numeric'
            });
        }

        function getWeekday(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { weekday: 'long' });
        }

        // Check if today is Ekadashi
        async function checkToday() {
            const response = await fetch(`${apiUrl}/today`);
            const data = await response.json();
            
            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ Yes! Today is Ekadashi ✨<br>🙏 Observe fasting and prayers</div>' 
                            : '<div class="ekadashi-no">Today is not Ekadashi</div>'}
                    </div>
                </div>
            `;
        }

        // Check if tomorrow is Ekadashi
        async function checkTomorrow() {
            const response = await fetch(`${apiUrl}/tomorrow`);
            const data = await response.json();
            
            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ Yes! Tomorrow is Ekadashi ✨<br>🙏 Prepare for fasting</div>' 
                            : '<div class="ekadashi-no">Tomorrow is not Ekadashi</div>'}
                    </div>
                </div>
            `;
        }

        // Show next Ekadashi
        async function showNext() {
            const response = await fetch(`${apiUrl}/next`);
            const data = await response.json();
            
            // Handle both string format and object format
            let dateStr, paksha;
            if (typeof data === 'string') {
                dateStr = data;
            } else if (data.date) {
                dateStr = data.date;
                paksha = data.paksha;
            }
            
            const formatted = formatDate(dateStr);
            const today = new Date();
            const nextDate = new Date(dateStr);
            const daysUntil = Math.ceil((nextDate - today) / (1000 * 60 * 60 * 24));

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>Next Ekadashi</h3>
                    <div class="result-content">
                        <div class="next-ekadashi-card">
                            <div class="next-ekadashi-date">
                                ${formatted}
                                ${paksha ? `<span class="paksha-badge paksha-${paksha.toLowerCase()}">${paksha} Paksha</span>` : ''}
                            </div>
                            <div class="next-ekadashi-days">
                                ${daysUntil} ${daysUntil === 1 ? 'day' : 'days'} from now
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show all Ekadashis in a year
        async function showYear() {
            const year = document.getElementById('yearInput').value;
            
            if (!year) {
                alert('Please enter a year');
                return;
            }

            const response = await fetch(`${apiUrl}/year/${year}`);
            const data = await response.json();

            // Handle both array of strings and array of objects
            let ekadashis = data.dates;
            
            const dateCards = ekadashis.map((item, index) => {
                let dateStr, paksha;
                
                if (typeof item === 'string') {
                    dateStr = item;
                } else {
                    dateStr = item.date;
                    paksha = item.paksha;
                }
                
                return `
                    <div class="date-card">
                        <div class="date-card-number">#${index + 1}</div>
                        <div class="date-card-date">
                            ${formatDateShort(dateStr)}
                            ${paksha ? `<span class="paksha-badge paksha-${paksha.toLowerCase()}">${paksha}</span>` : ''}
                        </div>
                        <div class="date-card-day">${getWeekday(dateStr)}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>Ekadashis in ${year}</h3>
                    <div class="result-content">
                        <div class="year-header">
                            <div class="total">Total: ${data.total} Ekadashis</div>
                        </div>
                        <div class="date-grid">
                            ${dateCards}
                        </div>
                    </div>
                </div>
            `;
        }

        // Check specific date
        async function checkDate() {
            const dateInput = document.getElementById('dateInput').value;
            
            if (!dateInput) {
                alert('Please enter a date in YYYY-MM-DD format');
                return;
            }

            const response = await fetch(`${apiUrl}/check/${dateInput}`);
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ This date is Ekadashi ✨</div>' 
                            : '<div class="ekadashi-no">This date is not Ekadashi</div>'}
                    </div>
                </div>
            `;
        }

        // Auto-test connection on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
